<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빈윤미 — 도서관 프로젝트 포트폴리오</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── 디자인 토큰 ── */
    :root {
      --bg: #FDF6F0;
      --header-bg: #5C3D2E;
      --header-text: #F5EDE4;
      --accent: #C9622F;
      --accent-hover: #A84E22;
      --card-bg: #FFFFFF;
      --card-border: #EDE0D4;
      --text: #333333;
      --text-sub: #777777;
      --tag-bg: #F5EDE4;
      --tag-text: #7A4F35;
      --radius-card: 12px;
      --radius-btn: 8px;
      --shadow-card: 0 2px 12px rgba(92,61,46,0.08);
      --font-serif: 'Noto Serif KR', serif;
      --font-sans: 'Noto Sans KR', sans-serif;
      --max-width: 960px;
    }

    /* ── 리셋 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }

    /* ── 레이아웃 ── */
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── 헤더 / 프로필 ── */
    .profile {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 56px 20px 48px;
      text-align: center;
    }
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
    }
    .profile-name {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .profile-role {
      font-size: 14px;
      opacity: 0.75;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }
    .profile-bio {
      font-size: 15px;
      opacity: 0.88;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── 프로젝트 섹션 ── */
    .projects {
      padding: 48px 20px 64px;
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .section-label {
      font-family: var(--font-serif);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── 카드 ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-card);
      padding: 24px;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-emoji {
      font-size: 24px;
      line-height: 1;
    }
    .card-title {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.65;
    }
    .card-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .card-features li {
      font-size: 13px;
      color: var(--text);
      padding-left: 14px;
      position: relative;
    }
    .card-features li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .card-footer {
      margin-top: auto;
      padding-top: 4px;
    }
    .btn-link {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 18px;
      border-radius: var(--radius-btn);
      transition: background 0.15s;
    }
    .btn-link:hover { background: var(--accent-hover); }
    .btn-local {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: var(--radius-btn);
      cursor: default;
    }

    /* ── 푸터 ── */
    footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-sub);
      border-top: 1px solid var(--card-border);
      padding: 24px 20px;
    }
  </style>
</head>
<body>

  <!-- 프로필 헤더 -->
  <header class="profile">
    <div class="profile-avatar">📚</div>
    <h1 class="profile-name">빈윤미</h1>
    <p class="profile-role">사서</p>
    <p class="profile-bio">바이브코딩으로 다양한 자동화를 시도 중인 평범한 일반인</p>
  </header>

  <!-- 프로젝트 목록 -->
  <main class="projects">
    <p class="section-label">Projects</p>
    <div class="grid">
      <!-- 카드들은 Task 2에서 추가 -->
    </div>
  </main>

  <footer>
    © 2026 빈윤미 · 도서관 프로젝트 포트폴리오
  </footer>

</body>
</html>
