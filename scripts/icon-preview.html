<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<style>
  body { font-family: sans-serif; background: #FFF5F7; padding: 40px; }
  h2 { color: #C0566A; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .item { background: white; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 2px 12px rgba(242,112,138,0.12); }
  .avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(249,196,210,0.45);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    box-shadow: 0 4px 20px rgba(242,112,138,0.25);
  }
  .label { font-size: 13px; color: #C0566A; font-weight: 700; margin-top: 8px; }
  .num { font-size: 11px; color: #aaa; margin-top: 4px; }
</style>
</head>
<body>
<h2>서가 아이콘 옵션 비교</h2>
<div class="grid">

  <!-- 1. 기존 (2단 서가) -->
  <div class="item">
    <div class="avatar">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <rect x="3" y="38" width="38" height="3" rx="1.5" fill="#C0566A" opacity="0.5"/>
        <rect x="3" y="6" width="3" height="33" rx="1.5" fill="#C0566A"/>
        <rect x="38" y="6" width="3" height="33" rx="1.5" fill="#C0566A"/>
        <rect x="3" y="18" width="38" height="2.5" rx="1" fill="#C0566A" opacity="0.6"/>
        <rect x="3" y="30" width="38" height="2.5" rx="1" fill="#C0566A" opacity="0.6"/>
        <rect x="7"  y="8"  width="4" height="10" rx="1" fill="#F2708A"/>
        <rect x="12" y="9"  width="3" height="9"  rx="1" fill="#FFB3C1"/>
        <rect x="16" y="7"  width="5" height="11" rx="1" fill="#E05570"/>
        <rect x="22" y="9"  width="3" height="9"  rx="1" fill="#F9C4D2"/>
        <rect x="26" y="8"  width="4" height="10" rx="1" fill="#F2708A" opacity="0.7"/>
        <rect x="31" y="7"  width="5" height="11" rx="1" fill="#FFB3C1" opacity="0.8"/>
        <rect x="7"  y="21" width="5" height="9"  rx="1" fill="#FFB3C1"/>
        <rect x="13" y="20" width="3" height="10" rx="1" fill="#F2708A" opacity="0.8"/>
        <rect x="17" y="21" width="4" height="9"  rx="1" fill="#E05570" opacity="0.7"/>
        <rect x="22" y="20" width="5" height="10" rx="1" fill="#F9C4D2"/>
        <rect x="28" y="21" width="3" height="9"  rx="1" fill="#F2708A"/>
        <rect x="32" y="20" width="4" height="10" rx="1" fill="#FFB3C1" opacity="0.9"/>
      </svg>
    </div>
    <div class="label">현재 (2단 서가)</div>
    <div class="num">① 기존</div>
  </div>

  <!-- 2. 3단 서가 + 사다리 -->
  <div class="item">
    <div class="avatar">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 프레임 -->
        <rect x="2" y="3" width="2.5" height="39" rx="1.2" fill="#D4506A"/>
        <rect x="39.5" y="3" width="2.5" height="39" rx="1.2" fill="#D4506A"/>
        <!-- 선반 3개 -->
        <rect x="2" y="13" width="40" height="2" rx="1" fill="#E8899A" opacity="0.7"/>
        <rect x="2" y="24" width="40" height="2" rx="1" fill="#E8899A" opacity="0.7"/>
        <rect x="2" y="35" width="40" height="2" rx="1" fill="#E8899A" opacity="0.7"/>
        <!-- 1단 책 -->
        <rect x="5"  y="4"  width="3" height="9" rx="1" fill="#F2708A"/>
        <rect x="9"  y="5"  width="4" height="8" rx="1" fill="#FFB3C1"/>
        <rect x="14" y="4"  width="3" height="9" rx="1" fill="#E05570"/>
        <rect x="18" y="5"  width="5" height="8" rx="1" fill="#F9C4D2"/>
        <rect x="24" y="4"  width="3" height="9" rx="1" fill="#F2708A" opacity="0.8"/>
        <rect x="28" y="5"  width="4" height="8" rx="1" fill="#FFD6DF"/>
        <rect x="33" y="4"  width="4" height="9" rx="1" fill="#E05570" opacity="0.7"/>
        <!-- 2단 책 -->
        <rect x="5"  y="15" width="4" height="9" rx="1" fill="#FFB3C1"/>
        <rect x="10" y="14" width="3" height="10" rx="1" fill="#F2708A"/>
        <rect x="14" y="15" width="5" height="9" rx="1" fill="#F9C4D2"/>
        <rect x="20" y="14" width="3" height="10" rx="1" fill="#E05570" opacity="0.8"/>
        <rect x="24" y="15" width="4" height="9" rx="1" fill="#FFB3C1"/>
        <rect x="29" y="14" width="3" height="10" rx="1" fill="#F2708A" opacity="0.9"/>
        <rect x="33" y="15" width="4" height="9" rx="1" fill="#FFD6DF"/>
        <!-- 3단 책 -->
        <rect x="5"  y="26" width="3" height="9" rx="1" fill="#E05570"/>
        <rect x="9"  y="25" width="5" height="10" rx="1" fill="#F9C4D2"/>
        <rect x="15" y="26" width="3" height="9" rx="1" fill="#F2708A"/>
        <rect x="19" y="25" width="4" height="10" rx="1" fill="#FFB3C1"/>
        <rect x="24" y="26" width="5" height="9" rx="1" fill="#E05570" opacity="0.7"/>
        <rect x="30" y="25" width="3" height="10" rx="1" fill="#F2708A" opacity="0.8"/>
        <rect x="34" y="26" width="3" height="9" rx="1" fill="#FFD6DF"/>
        <!-- 사다리 -->
        <rect x="36" y="4" width="1.5" height="31" rx="0.7" fill="#D4506A" opacity="0.5"/>
        <rect x="36" y="10" width="4" height="1.5" rx="0.7" fill="#D4506A" opacity="0.4"/>
        <rect x="36" y="20" width="4" height="1.5" rx="0.7" fill="#D4506A" opacity="0.4"/>
      </svg>
    </div>
    <div class="label">3단 서가 + 사다리</div>
    <div class="num">②</div>
  </div>

  <!-- 3. 아치형 도서관 입구 -->
  <div class="item">
    <div class="avatar">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 건물 외벽 -->
        <rect x="3" y="16" width="38" height="26" rx="2" fill="#F9C4D2"/>
        <!-- 아치 입구 -->
        <path d="M15 42 L15 28 Q15 20 22 20 Q29 20 29 28 L29 42Z" fill="#F2708A"/>
        <!-- 아치 안 (어두운 부분) -->
        <path d="M17 42 L17 29 Q17 23 22 23 Q27 23 27 29 L27 42Z" fill="#E05570"/>
        <!-- 지붕 삼각형 -->
        <path d="M1 18 L22 4 L43 18Z" fill="#F2708A"/>
        <!-- 지붕 라인 -->
        <path d="M1 18 L22 4 L43 18" stroke="#D4506A" stroke-width="1" fill="none"/>
        <!-- 창문 왼쪽 -->
        <rect x="6" y="22" width="7" height="7" rx="1" fill="#FFE0E8"/>
        <line x1="9.5" y1="22" x2="9.5" y2="29" stroke="#F2708A" stroke-width="0.8"/>
        <line x1="6" y1="25.5" x2="13" y2="25.5" stroke="#F2708A" stroke-width="0.8"/>
        <!-- 창문 오른쪽 -->
        <rect x="31" y="22" width="7" height="7" rx="1" fill="#FFE0E8"/>
        <line x1="34.5" y1="22" x2="34.5" y2="29" stroke="#F2708A" stroke-width="0.8"/>
        <line x1="31" y1="25.5" x2="38" y2="25.5" stroke="#F2708A" stroke-width="0.8"/>
        <!-- 계단 -->
        <rect x="13" y="39" width="18" height="2" rx="0.5" fill="#E8899A" opacity="0.6"/>
        <rect x="11" y="41" width="22" height="2" rx="0.5" fill="#E8899A" opacity="0.4"/>
        <!-- 별 장식 -->
        <circle cx="22" cy="11" r="1.5" fill="#FFE0E8" opacity="0.9"/>
      </svg>
    </div>
    <div class="label">도서관 건물</div>
    <div class="num">③</div>
  </div>

  <!-- 4. 책 + 돋보기 (검색/탐색) -->
  <div class="item">
    <div class="avatar">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 책 더미 -->
        <rect x="6" y="30" width="26" height="6" rx="2" fill="#F2708A"/>
        <rect x="8" y="23" width="22" height="8" rx="2" fill="#FFB3C1"/>
        <rect x="5" y="16" width="28" height="8" rx="2" fill="#F9C4D2"/>
        <rect x="9" y="9"  width="18" height="8" rx="2" fill="#E05570" opacity="0.8"/>
        <!-- 책 라인 -->
        <line x1="11" y1="16" x2="11" y2="24" stroke="#F2708A" stroke-width="0.8" opacity="0.6"/>
        <line x1="10" y1="23" x2="10" y2="31" stroke="#E05570" stroke-width="0.8" opacity="0.5"/>
        <line x1="13" y1="30" x2="13" y2="36" stroke="#D4506A" stroke-width="0.8" opacity="0.5"/>
        <!-- 돋보기 -->
        <circle cx="31" cy="13" r="7" stroke="#D4506A" stroke-width="2.5" fill="none"/>
        <circle cx="31" cy="13" r="4.5" fill="#FFE0E8" opacity="0.6"/>
        <line x1="36" y1="18" x2="41" y2="23" stroke="#D4506A" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 돋보기 반사광 -->
        <circle cx="29" cy="11" r="1.2" fill="white" opacity="0.7"/>
      </svg>
    </div>
    <div class="label">책 + 돋보기</div>
    <div class="num">④</div>
  </div>

</div>
</body>
</html>
